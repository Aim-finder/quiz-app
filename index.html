<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="home.css">

<title>Quiz</title>
</head>

<body>

<div class="container">
<div class="card">

<h1>Quiz App</h1>

<h3>Number of Questions</h3>

<select id="count">
<option value="50">50</option>
<option value="100">100</option>
</select>

<h3>Timer</h3>

<label>
<input type="radio" name="timer" value="yes" checked>
With Timer
</label>

<label>
<input type="radio" name="timer" value="no">
No Timer
</label>

<br><br>

<button id="start">Start Quiz</button>

</div>
</div>

<script src="home.js"></script>

</body>
</html>
